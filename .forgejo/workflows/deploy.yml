name: Deploy to Codeberg Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      - uses: actions/git-pages@v2
        with:
          site: https://neolang.codeberg.page
          token: ${{ forge.token }}
          source: dist/
